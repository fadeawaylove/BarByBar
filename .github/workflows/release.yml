name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --group dev --group release

      - name: Run tests
        run: uv run pytest -q

      - name: Build release bundle
        shell: pwsh
        run: .\scripts\build_release.ps1 -Tag "${{ github.ref_name }}"

      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      - name: Build MSI installer
        shell: pwsh
        run: .\scripts\build_installer.ps1 -Tag "${{ github.ref_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/BarByBar-${{ github.ref_name }}-windows-x64.zip
            dist/BarByBar-${{ github.ref_name }}-windows-x64.msi
