name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Verify tagged commit is on master
        shell: pwsh
        run: |
          git fetch origin master --depth=1
          git merge-base --is-ancestor $env:GITHUB_SHA origin/master
          if ($LASTEXITCODE -ne 0) {
            throw "Tagged commit $env:GITHUB_SHA is not contained in origin/master."
          }

      - name: Sync release dependencies
        run: uv sync --group release

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          if (Get-Command ISCC.exe -ErrorAction SilentlyContinue) {
            Write-Host "Inno Setup already available on PATH."
          } else {
            choco install innosetup --no-progress -y
          }

      - name: Inspect Inno Setup installation
        shell: pwsh
        run: |
          $command = Get-Command ISCC.exe -ErrorAction SilentlyContinue | Select-Object Name, Source
          if ($command) {
            $command | Format-Table -AutoSize
          } else {
            Write-Host "ISCC.exe was not found on PATH. Searching common install roots..."
            Get-ChildItem 'C:\Program Files (x86)\Inno Setup 6', 'C:\Program Files\Inno Setup 6' -Recurse -Filter ISCC.exe -ErrorAction SilentlyContinue |
              Select-Object -First 10 FullName
          }

      - name: Build release artifacts
        shell: pwsh
        run: .\scripts\build_installer.ps1 -Tag "${{ github.ref_name }}"

      - name: Generate release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repoUrl = "https://github.com/${{ github.repository }}"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          python .\scripts\generate_release_notes.py --tag $tag --repo-url $repoUrl --output $notesPath
          "RELEASE_NOTES_PATH=$notesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: |
            dist/BarByBar-${{ github.ref_name }}-windows-x64.zip
            dist/BarByBar-${{ github.ref_name }}-windows-x64-setup.exe
